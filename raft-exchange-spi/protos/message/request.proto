syntax = "proto3";

package com.binance.raftexchange.stubs.request;

option java_package = "com.binance.raftexchange.stubs.request";
option java_multiple_files = true;

import "message/common.proto";

// Binary Data Command
message ApiBinaryDataCommand {
  int32 transferId = 1;
  BinaryDataCommand data = 2;
}

// Place Order Command
message ApiPlaceOrder {
  int64 price = 1;
  int64 size = 2;
  int64 orderId = 3;
  OrderAction action = 4;
  OrderType orderType = 5;
  int64 uid = 6;
  int32 symbol = 7;
  int32 userCookie = 8;
  int32 leverage = 9;
  MarginMode marginMode = 10;
  int64 reservePrice = 11;
}

// Adjust User Balance Command
message ApiAdjustUserBalance {
  int64 uid = 1;
  int32 currency = 2;
  int64 amount = 3;
  int64 transactionId = 4;
  BalanceAdjustmentType adjustmentType = 5;
}

// Order Book Request Command
message ApiOrderBookRequest {
  int32 symbol = 1;
  int32 size = 2;
}

// No Operation Command
message ApiNop {
}

// Move Order Command
message ApiMoveOrder {
  int64 orderId = 1;
  int64 newPrice = 2;
  int64 uid = 3;
  int32 symbol = 4;
}

// Cancel Order Command
message ApiCancelOrder {
  int64 orderId = 1;
  int64 uid = 2;
  int32 symbol = 3;
}

// Add User Command
message ApiAddUser {
  int64 uid = 1;
}

// Reduce Order Command
message ApiReduceOrder {
  int64 orderId = 1;
  int64 uid = 2;
  int32 symbol = 3;
  int64 reduceSize = 4;
}

// Suspend User Command
message ApiSuspendUser {
  int64 uid = 1;
}

// Resume User Command
message ApiResumeUser {
  int64 uid = 1;
}

message ApiAdjustLeverage {
  int64 uid = 1;
  int32 symbol = 2;
  int32 leverage = 3;
}

message ApiAdjustPositionMode {
  int64 uid = 1;
  PositionMode positionMode = 2;
}

message ApiAdjustMargin {
  int64 transactionId = 1;
  int64 uid = 2;
  int32 symbol = 3;
  int32 currency = 4;
  int64 amount = 5;
  MarginMode marginMode = 6;
}

message ApiAdjustMarkPrice {
  int64 transactionId = 1;
  int32 symbol = 2;
  int64 markPrice = 3;
}

message ApiSettleFundingFees {
  int64 transactionId = 1;
  int32 symbol = 2;
  int64 fundingRate = 3;
  int64 rateScaleK = 4;
}

message ApiSettlePNL {
  int64 transactionId = 1;
  int32 symbol = 2;
  int64 settlePrice = 3;
}

// Union type for all API commands
message ApiCommand {
  int64 timestamp = 1;
  oneof command {
    ApiBinaryDataCommand binary_data = 2;
    ApiPlaceOrder place_order = 3;
    ApiAdjustUserBalance adjust_balance = 4;
    ApiOrderBookRequest order_book_request = 6;
    ApiNop nop = 7;
    ApiMoveOrder move_order = 8;
    ApiCancelOrder cancel_order = 9;
    ApiAddUser add_user = 10;
    ApiReduceOrder reduce_order = 11;
    ApiSuspendUser suspend_user = 12;
    ApiResumeUser resume_user = 13;
    ApiAdjustLeverage adjust_leverage = 14;
    ApiAdjustPositionMode adjust_position_mode = 15;
    ApiAdjustMargin adjust_margin = 16;
    ApiAdjustMarkPrice adjust_markprice = 17;
    ApiSettleFundingFees settle_funding_fees = 18;
    ApiSettlePNL settle_pnl = 19;
  }
}


// Path: src/main/java/exchange/core2/core/common/api/binary
enum BinaryCommandType {
  BINARY_COMMAND_TYPE_UNSPECIFIED = 0; // proto3 enum必须从0开始
  ADD_ACCOUNTS = 1002;
  ADD_SYMBOLS = 1003;
  ADD_CURRENCIES = 1004;
}

message BatchAddAccountsCommand {
  map<int64, AccountBalanceMap> users = 1;
}

message AccountBalanceMap {
  // <currency, balance> in RiskEngine
  map<int32, int64> balances = 1;
}

message BatchAddSymbolsCommand {
  map<int32, CoreSymbolSpecification> symbols = 1;
}

message BatchAddCurrenciesCommand {
  map<int32, CoreCurrencySpecification> currencies = 1;
}

message BinaryDataCommand {
  oneof command {
    BatchAddAccountsCommand add_accounts = 1;
    BatchAddSymbolsCommand add_symbols = 2;
    BatchAddCurrenciesCommand add_currencies = 3;
  }
}

//只是请求Node列表 似乎也不需要有什么字段
message NodeListCommand {

}