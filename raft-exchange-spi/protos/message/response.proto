    SYMBOL_MGMT_SYMBOL_ALREADY_EXISTS = 5001;

    // ===== Loan（详见 loan.md §5）—— 值 = |exchange-core 侧负值|，跟 SerializeHelper 侧 abs 映射一致 =====
    LOAN_NOT_ENABLED = 6001;
    LOAN_ALREADY_EXISTS = 6002;
    LOAN_NOT_FOUND = 6003;
    LOAN_UID_MISMATCH = 6004;
    LOAN_USER_SUSPENDED = 6005;
    LOAN_INVALID_AMOUNT = 6010;
    LOAN_PRINCIPAL_EXCEEDS_LIMIT = 6011;
    LOAN_MARKPRICE_NOT_READY = 6012;
    LOAN_LTV_TOO_HIGH = 6020;
    LOAN_LTV_TOO_HIGH_AFTER_BORROW = 6021;
    LOAN_LTV_TOO_HIGH_AFTER_RELEASE = 6022;
    LOAN_CROSS_LTV_TOO_HIGH_AFTER_WITHDRAW = 6023;
    LOAN_COLLATERAL_INSUFFICIENT = 6030;
    LOAN_COLLATERAL_NOT_ALLOWED = 6031;
    LOAN_COLLATERAL_EXCEEDS_LOAN = 6032;
    LOAN_ACCOUNT_INSUFFICIENT = 6040;
    LOAN_POOL_INSUFFICIENT = 6050;
