    LOAN_INVALID_CONFIG = 6060;
    LOAN_INVALID_SYMBOL_TYPE = 6070;
    LOAN_NUMERAIRE_NOT_CONFIGURED = 6080;
    LOAN_NOT_IMPLEMENTED = 6099;

    // ===== 内部错误 / 状态持久化 =====
    INTERNAL_ERROR = 8000;
    BINARY_COMMAND_FAILED = 8001;
    REPORT_QUERY_UNKNOWN_TYPE = 8003;
    STATE_PERSIST_RISK_ENGINE_FAILED = 8010;
    STATE_PERSIST_MATCHING_ENGINE_FAILED = 8020;
    STATE_RECOVER_RISK_ENGINE_FAILED = 8021;
    STATE_RECOVER_MATCHING_ENGINE_FAILED = 8022;

    // ===== raft 路由 =====
    NO_LEADER = 9997;
    NEED_MOVE = 9998;
    DROP = 9999;
}

enum NodeType {
    LEADER = 0;
    FOLLOW = 1;
}

message ServerNode {
    NodeType type = 1;
    string host = 2;
    int32 port = 3;
}

//pb这个编译器不允许returns(stream Enum) 这样
// 所以需要包一下
message CommandResult {
    oneof mainMessages {
        CommandResultCode resultCode = 1;
        OrderCommand orderCommand = 2;
    }
    oneof extMessage {
        ServerNode leaderNode = 3; //当前的操作不允许在follow上执行的时候 才会返回这个
    }
}

enum OrderCommandType {
    ORDER_COMMAND_INVALID = 0; // proto3 enum必须从0开始
    // ===== 订单（现货 & 期货共用）=====
    PLACE_ORDER = 1;
    CANCEL_ORDER = 2;
    MOVE_ORDER = 3;
    REDUCE_ORDER = 4;
    CLOSE_POSITION = 5;
    ORDER_BOOK_REQUEST = 6;
    // ===== 账户 / 用户 =====
    ADD_USER = 10;
    BALANCE_ADJUSTMENT = 11;
    SUSPEND_USER = 12;
    RESUME_USER = 13;
    // ===== 期货（保证金 / 结算 / 强平 / IF / ADL）=====
    LEVERAGE_ADJUSTMENT = 21;
    POSITION_MODE_ADJUSTMENT = 22;
    MARGIN_ADJUSTMENT = 23;
    MARKPRICE_ADJUSTMENT = 24;
    SETTLE_FUNDINGFEES = 25;
    SETTLE_PNL = 26;
    RESET_FEE = 27;
    SYSTEM_LIQUIDATION_NOTIFY = 31;
    IF_TAKEOVER = 40;
    AUTO_DELEVERAGING = 41;
    IF_DEPOSIT = 42;
    IF_WITHDRAW = 43;
    // ===== Loan（详见 loan.md §5）=====
    LOAN_CREATE = 50;
    LOAN_REPAY = 51;
    LOAN_ADD_COLLATERAL = 52;
    LOAN_RELEASE_COLLATERAL = 53;
    LOAN_FORCE_LIQUIDATE = 54;
    LOAN_CROSS_ADD_COLLATERAL = 55;
    LOAN_CROSS_WITHDRAW_COLLATERAL = 56;
    LOAN_CROSS_BORROW = 57;
    LOAN_CROSS_REPAY = 58;
    LOAN_CROSS_FORCE_LIQUIDATE = 59;
    POOL_DEPOSIT = 60;
    POOL_WITHDRAW = 61;
    // ===== 系统 / 二进制 =====
    BINARY_DATA_QUERY = 90;
    BINARY_DATA_COMMAND = 91;
    PERSIST_STATE_MATCHING = 110;
    PERSIST_STATE_RISK = 111;
    GROUPING_CONTROL = 118;
    NOP = 120;
    RESET = 124;
    SHUTDOWN_SIGNAL = 127;
    RESERVED_COMPRESSED = 255;  // -1 in byte becomes 255 in unsigned context
}

enum MatcherEventType {
    TRADE = 0;
    REJECT = 1;
    REDUCE = 2;
    BINARY_EVENT = 3;
    IF_EVENT = 4;
    ADL_EVENT = 5;
    FUNDING_EVENT = 6;
}

message MatcherTradeEvent {
    MatcherEventType eventType = 1;
    int32 section = 2;
    bool activeOrderCompleted = 3;
    int64 matchedOrderId = 4;
    int64 matchedOrderUid = 5;
    bool matchedOrderCompleted = 6;
    int64 price = 7;
    int64 size = 8;
    int64 bidderHoldPrice = 9;
    int64 baseScaleK = 10;
    int64 quoteScaleK = 11;
    MatcherTradeEvent next_event = 12;
}

message L2MarketData {
    int32 ask_sizes = 1;
    int32 bid_sizes = 2;
    repeated int64 ask_prices = 3;
    repeated int64 ask_volumes = 4;
    repeated int64 ask_orders = 5;
    repeated int64 bid_prices = 6;
    repeated int64 bid_volumes = 7;
    repeated int64 bid_orders = 8;
}

message OrderCommand {
    OrderCommandType command = 1;
    int64 order_id = 2;
    int32 symbol = 3;
    int64 price = 4;
    int64 size = 5;
    int64 reserve_bid_price = 6;
    oneof order_action_present {
        OrderAction action = 7;
    }
    oneof order_type_present{
       OrderType order_type = 8;
    }
    int64 uid = 9;
    int64 timestamp = 10;
    int32 user_cookie = 11;
    int32 leverage = 12;
    MarginMode margin_mode = 13;
    int64 events_group = 14;
    int32 service_flags = 15;
    CommandResultCode result_code = 16;
    oneof matcher_event_present {
      MatcherTradeEvent matcher_event = 17;
    }
    oneof market_data_present {
      L2MarketData market_data = 18;
    }
}

message NodeList {
    repeated ServerNode nodes = 1;
}
