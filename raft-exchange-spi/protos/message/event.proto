syntax = "proto3";

package com.binance.raftexchange.stubs;

option java_package = "com.binance.raftexchange.stubs";
option java_multiple_files = true;

import "message/common.proto";

message TradeEventPB {
  int32  symbol = 1;
  int64 totalVolume = 2 ;
  int64 takerOrderId = 3 ;
  int64 takerUid = 4;
  OrderAction takerAction = 5;
  bool  takeOrderCompleted = 6;
  int64  timestamp = 7;
  repeated TradePB trades = 8;
}

message ReduceEventPB {
  int32 symbol = 1;
  int64 reducedVolume = 2;
  bool orderCompleted = 3;
  int64 price = 4;
  int64 orderId = 5;
  int64 uid = 6;
  int64 timestamp = 7;
}

message OrderBookRecordPB {
  int64 price = 1;
  int64 volume = 2;
  int32 orders = 3;
}

// OrderBook message definition
message OrderBookPB {
  int32 symbol = 1;
  repeated OrderBookRecordPB asks = 2;
  repeated OrderBookRecordPB bids = 3;
  int64 timestamp = 4;
}

message FundsEventPB {
  int64 orderId = 1;
  int64 uid = 2;
  int32 currency = 3;
  int64 free = 4;
  int64 locked = 5;
  FundEventType eventType = 6;
  int32 symbol = 7;
  PositionDirection direction = 8;
  int64 openVolume = 9;
  int64 openInitMarginSum = 10;
  int64 openPriceSum = 11;
  int64 profit = 12;
  int64 pendingSellSize = 13;
  int64 pendingBuySize = 14;
  int64 pendingSellAvgPrice = 15;
  int64 pendingBuyAvgPrice = 16;
  int32 leverage = 17;
  MarginMode marginMode = 18;
  int64 extraMargin = 19;
  int64 unrealizedProfit = 20;
  int64 liquidationPrice = 21;
  int64 marginRatioScaleK = 22;
  int64 tradeSize = 23;
  int64 tradePrice = 24;
  int64 fee = 25;
}

enum FundEventType {
  FUND_EVENT_TYPE_INVALID = 0; // proto3 enum必须从0开始

  DEPOSIT = 1;
  LOCKED = 2;
  TRANSFER = 3;
  UNLOCKED = 4;
  WITHDRAW = 5;

  LOCK_PENDING = 6;
  UNLOCK_PENDING = 7;
  OPEN_POSITION = 8;
  CLOSE_POSITION = 9;
  LIQUIDATION = 10;
  FUNDINGFEE_SETTLEMENT = 11;
  PNL_SETTLEMENT = 12;

  MARGIN_ADJUST = 13;
  MARGIN_REFUND = 14;

  MARGIN_ALERT = 15;
  LIQUIDATION_ALERT = 16;
}

message TradePB {
  int64 makerOrderId = 1;
  int64 makerUid = 2;
  bool makerOrderCompleted = 3;
  int64 price = 4;
  int64 volume = 5;
}