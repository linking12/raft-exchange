syntax = "proto3";

package com.binance.raftexchange.stubs;

option java_package = "com.binance.raftexchange.stubs";
option java_multiple_files = true;

import "message/common.proto";

message SpotExecutionReportPB {
  int64 executionId = 1;
  ExecType executionType = 2;
  OrderStatus orderStatus = 3;
  int32 symbol = 4;
  int64 baseScaleK = 5;
  int64 quoteScaleK = 6;
  int64 accountId = 7;
  int64 clOrdId = 8;
  int64 orderId = 9;
  OrderType orderType = 10;
  OrderAction side = 11;
  int64 qty = 12;
  int64 price = 13;
  int64 quoteOrderQty = 14;
  int64 orderCreationTime = 15;
  int64 tradeId = 16;
  int64 lastQty = 17;
  int64 lastPrice = 18;
  int64 lastQuoteQty = 19;
  int64 cumulativeQty = 20;
  int64 cumulativeQuoteQty = 21;
  int64 commission = 22;
  int32 commissionAsset = 23;
  bool isMaker = 24;
  bool workingIndicator = 25;
}

enum ExecType {
  NEW = 0;
  TRADE = 1;
  REDUCE = 2;
  CANCEL = 3;
  REJECT = 4;
}

enum OrderStatus {
  NEWED = 0;
  PARTIALLY_FILLED = 1;
  FILLED = 2;
  CANCELED = 3;
  REJECTED = 4;
}

message FuturesExecutionReportPB {
  int64 uniId = 1;
  ExecType executionType = 2;
  OrderStatus orderStatus = 3;
  int32 symbol = 4;
  int64 orderQtyScale = 5;
  int64 priceScale = 6;
  int64 userId = 7;
  int64 clOrdId = 8;
  int64 orderId = 9;
  OrderType orderType = 10;
  OrderAction side = 11;
  int64 counterpartyId = 12;
  int64 price = 13;
  int64 orderQty = 14;
  int64 createTime = 15;
  int64 execId = 16;
  SymbolType contractType = 17;
  PositionMode positionSide = 18;
  int64 lastQty = 19;
  int64 lastPx = 20;
  int64 cumQty = 21;
  int64 cumQuoteQty = 22;
  int64 avgPx = 23;
  int64 fee = 24;
  int32 feeAssetId = 25;
  bool isMaker = 26;
}

message OrderBookRecordPB {
  int64 price = 1;
  int64 volume = 2;
  int32 orders = 3;
}

// OrderBook message definition
message OrderBookPB {
  int32 symbol = 1;
  repeated OrderBookRecordPB asks = 2;
  repeated OrderBookRecordPB bids = 3;
  int64 timestamp = 4;
}

message FundEventReportPB {
  int64 accountId = 1;
  FundEventType eventType = 2;
  BalanceSnapshot balances = 3;
  PositionSnapshot positions = 4;
}

message BalanceSnapshot {
  int32 currency = 1;
  int64 currencyScakeK = 2;
  int64 free = 3;
  int64 locked = 4;
}

message PositionSnapshot {
  int32 symbolId = 1;
  int64 baseScaleK = 2;
  int64 quoteScaleK = 3;
  PositionDirection direction = 4;
  int64 quantity = 5;
  int64 openPriceSum = 6;
  int64 cumRealized = 7;
  bool isolated = 8;
  int64 isolatedWallet = 9;
  int32 leverage = 10;
  int64 openInitMarginSum = 11;
  int64 markPrice = 12;
  int64 unrealizedProfit = 13;
  int64 liquidationPrice = 14;
  int64 marginRatioScaleK = 15;
  int64 bidsNotional = 16;
  int64 asksNotional = 17;
  int64 bidsQty = 18;
  int64 asksQty = 19;
}

enum FundEventType {
  FUND_EVENT_TYPE_INVALID = 0; // proto3 enum必须从0开始

  DEPOSIT = 1;
  LOCKED = 2;
  TRANSFER = 3;
  UNLOCKED = 4;
  WITHDRAW = 5;

  LOCK_PENDING = 6;
  UNLOCK_PENDING = 7;
  OPEN_POSITION = 8;
  CLOSE_POSITION = 9;
  LIQUIDATION = 10;
  FUNDINGFEE_SETTLEMENT = 11;
  PNL_SETTLEMENT = 12;

  MARGIN_ADJUST = 13;
  MARGIN_REFUND = 14;

  MARGIN_ALERT = 15;
  LIQUIDATION_ALERT = 16;
}