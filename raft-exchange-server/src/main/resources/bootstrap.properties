server.port=8080
spring.application.name=raft-exchange
eureka.client.serviceUrl.defaultZone=http://eureka1.devfdg.net/eureka/,http://eureka2.devfdg.net/eureka/
server.tomcat.threads.max=25
server.tomcat.threads.min-spare=25

spring.autoconfigure.exclude=\
com.binance.platform.common.autoconfigure.AlarmAutoConfiguration,\
com.binance.platform.common.autoconfigure.OldMasterCommonConfig

raftexchange.eventbus.topic=raftexchange-trade-event
raftexchange.kafka.boostrap.servers=kafka1.devfdg.net:9092,kafka2.devfdg.net:9092,kafka3.devfdg.net:9092