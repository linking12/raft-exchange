server.port=8080
spring.application.name=raft-exchange
eureka.client.serviceUrl.defaultZone=http://eureka1.devfdg.net/eureka/,http://eureka2.devfdg.net/eureka/
server.tomcat.threads.max=25
server.tomcat.threads.min-spare=25


raftexchange.kafka.spot.bootstrap.servers=kafka1.devfdg.net:9092,kafka2.devfdg.net:9092,kafka3.devfdg.net:9092
raftexchange.kafka.spot.topic=raftexchange-trade-event
raftexchange.kafka.perp.bootstrap.servers=kafka1.devfdg.net:9092,kafka2.devfdg.net:9092,kafka3.devfdg.net:9092
raftexchange.kafka.perp.topic=raftexchange-trade-event
raftexchange.kafka.delivery.bootstrap.servers=kafka1.devfdg.net:9092,kafka2.devfdg.net:9092,kafka3.devfdg.net:9092
raftexchange.kafka.delivery.topic=raftexchange-trade-event
raftexchange.kafka.fund.bootstrap.servers=kafka1.devfdg.net:9092,kafka2.devfdg.net:9092,kafka3.devfdg.net:9092
raftexchange.kafka.fund.topic=raftexchange-fund-event
raftexchange.kafka.other.bootstrap.servers=kafka1.devfdg.net:9092,kafka2.devfdg.net:9092,kafka3.devfdg.net:9092
raftexchange.kafka.other.topic=raftexchange-market-data